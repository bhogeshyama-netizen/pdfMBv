<!DOCTYPE html>
<html>
<head>
<title>High Quality PDF Compressor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
background:#f4f4f4;
}

.container{
background:white;
width:420px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>PDF Compressor (High Quality)</h2>

<input type="file" id="fileInput" accept="application/pdf"><br><br>

<button onclick="compressPDF()">Compress PDF</button>

<p id="status"></p>

</div>

<script>

async function compressPDF(){

const file = document.getElementById("fileInput").files[0];

if(!file){
alert("Please upload PDF");
return;
}

document.getElementById("status").innerText="Processing...";

const pdfData = await file.arrayBuffer();

const pdf = await pdfjsLib.getDocument({data:pdfData}).promise;

const { jsPDF } = window.jspdf;

const newPDF = new jsPDF();

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);

/* Higher resolution */
const viewport = page.getViewport({scale:1.5});

const canvas = document.createElement("canvas");
const context = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:context,
viewport:viewport
}).promise;

/* High quality image */
const imgData = canvas.toDataURL("image/jpeg",0.95);

if(i>1) newPDF.addPage();

newPDF.addImage(imgData,"JPEG",0,0,210,297);

}

newPDF.save("compressed_high_quality.pdf");

document.getElementById("status").innerText="Done";

}

</script>

</body>
</html>
